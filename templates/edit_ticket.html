<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Ticket - GIC Thingyan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="{{ url_for('admin_dashboard') }}" class="nav-brand">GIC Thingyan <span style="background: rgba(14, 165, 233, 0.15); color: var(--primary-hover); padding: 4px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.5px; border: 1px solid rgba(14, 165, 233, 0.3); margin-left: 8px; box-shadow: 0 2px 4px rgba(14, 165, 233, 0.1);">Admin</span></a>
            <div class="nav-user">
                <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline" style="border:none;">Dashboard</a>
                <a href="{{ url_for('admin_check_in') }}" class="btn btn-outline" style="border:none;">Check-in</a>
                <a href="{{ url_for('admin_check_out') }}" class="btn btn-outline" style="border:none;">Check-out</a>
                <a href="{{ url_for('admin_attendance') }}" class="btn btn-outline" style="border:none;">Attendance</a>
                <a href="{{ url_for('manage_users') }}" class="btn btn-outline" style="border:none;">Manage Users</a>
                <span>Welcome, <strong>{{ session['username'] }}</strong></span>
                <a href="{{ url_for('logout') }}" class="btn btn-outline" style="border:none;">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 500px; margin-top: 40px;">
        <div class="card">
            <h2 class="card-header">Edit Ticket Details</h2>
            <div style="margin-bottom:24px; font-size:1rem; color:var(--text-muted); font-family:monospace; background:rgba(255,255,255,0.5); padding:16px; border-radius:12px; border:1px solid var(--border); backdrop-filter:blur(4px);">
                Ticket ID: {{ ticket.id }}
            </div>
            <form method="POST">
                <div class="form-group">
                    <label for="student_name">Student Name</label>
                    <input type="text" id="student_name" name="student_name" value="{{ ticket.student_name }}" required>
                </div>
                <div class="form-group">
                    <label for="class_name">Grade / Class Name</label>
                    <input type="text" id="class_name" name="class_name" value="{{ ticket.class_name }}" required>
                </div>
                <div style="display:flex; gap:12px; margin-top:32px;">
                    <button type="submit" class="btn btn-primary" style="flex:1;">Save Changes</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline" style="flex:1; text-align:center;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
