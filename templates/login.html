<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GIC Thingyan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container login-container">
        <div class="login-logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="GIC Logo" style="height: 180px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));">
        </div>
        <div class="login-subtitle">Thingyan Festival Ticketing System</div>
        
        <div class="card">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="flash-messages">
                {% for message in messages %}
                  <div class="flash-message">{{ message }}</div>
                {% endfor %}
                </div>
              {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div class="form-group">
                    <label for="token">Access Token</label>
                    <input type="text" id="token" name="token" placeholder="Enter your secure token..." required autocomplete="off">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
